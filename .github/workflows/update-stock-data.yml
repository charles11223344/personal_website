name: Update stock data

on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stock-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest stock data
        run: python scripts/update_stock_data.py

      - name: Commit data update
        run: |
          if git diff --quiet -- data/stocks.json; then
            echo "No stock data changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/stocks.json
            git commit -m "Update stock data"
            git push
          fi
